name: Build RGB Fairy EXE
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build FairyRgbController/FairyRgbController.csproj --configuration Release
      - name: Find EXE
        id: find_exe
        run: |
          $exePath = Get-ChildItem -Path FairyRgbController/bin/Release/net8.0-windows -Recurse -Filter *.exe | Select-Object -First 1 -ExpandProperty FullName
          echo "exe_path=$exePath" >> $env:GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgb-fairy-exe
          path: ${{ steps.find_exe.outputs.exe_path }}
