name: Build WPF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build FairyRgbController/FairyRgbController.csproj --configuration Release

    - name: Test (optional)
      # If you have tests, add them here
      # run: dotnet test --configuration Release
      run: echo "No tests configured"
