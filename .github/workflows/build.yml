name: Build WPF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: FairyRgbController
      run: dotnet restore

    - name: Build
      working-directory: FairyRgbController
      run: dotnet build --configuration Release

    - name: Publish standalone EXE
      working-directory: FairyRgbController
      run: dotnet publish --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishReadyToRun=true -p:PublishTrimmed=true -o publish/

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: FairyRgbController-win-x64
        path: FairyRgbController/publish/
        if-no-files-found: error